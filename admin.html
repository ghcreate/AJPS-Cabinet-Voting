<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMARA JYOTHI PUBLIC SCHOOL - Live Voting Results</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="admin-app">
    <header class="frame frame-top">
      <div class="brand-bar">
        <img class="school-logo" src="logo.png" alt="AMARA JYOTHI PUBLIC SCHOOL logo">
        <h1>AMARA JYOTHI PUBLIC SCHOOL</h1>
        <button class="theme-toggle" type="button" data-theme-toggle>Midnight</button>
      </div>
    </header>

    <section class="admin-login" id="adminLogin" aria-labelledby="adminLoginTitle">
      <form class="admin-login-panel" id="adminLoginForm">
        <h2 id="adminLoginTitle">Admin Login</h2>
        <label>
          <span>User ID</span>
          <input type="text" id="adminUserId" value="ajps-admin" autocomplete="username">
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="adminPassword" autocomplete="current-password">
        </label>
        <p id="adminLoginMessage" role="status" aria-live="polite"></p>
        <button class="admin-login-button" type="submit">Login</button>
      </form>
    </section>

    <section class="admin-toolbar">
      <div>
        <h2>Live Voting Results</h2>
        <p id="adminStatus">Loading current result...</p>
      </div>
      <div class="admin-actions">
        <a class="secondary-link" href="index.html">Back to Voting Page</a>
        <button class="refresh-button" type="button" id="refreshBtn">Refresh</button>
      </div>
    </section>

    <section class="results-grid" id="resultsGrid" aria-live="polite"></section>
  </main>

  <script src="theme.js"></script>
  <script src="admin.js?v=20260611-admin-login"></script>
</body>
</html>
