<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMARA JYOTHI PUBLIC SCHOOL - Cabinet Voting</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="voting-app">
    <header class="frame frame-top">
      <div class="brand-bar">
        <img class="school-logo" src="logo.png" alt="AMARA JYOTHI PUBLIC SCHOOL logo">
        <h1>AMARA JYOTHI PUBLIC SCHOOL</h1>
      </div>
    </header>

    <section class="house-page" id="housePage" aria-labelledby="houseTitle">
      <div class="house-panel">
        <h2 id="houseTitle">Select your house</h2>
        <div class="house-grid" role="radiogroup" aria-label="House selection">
          <label class="house-card yellow-house">
            <input type="radio" name="selected_house" value="Yellow House">
            <span>Yellow House</span>
          </label>
          <label class="house-card red-house">
            <input type="radio" name="selected_house" value="Red House">
            <span>Red House</span>
          </label>
          <label class="house-card blue-house">
            <input type="radio" name="selected_house" value="Blue House">
            <span>Blue House</span>
          </label>
          <label class="house-card green-house">
            <input type="radio" name="selected_house" value="Green House">
            <span>Green House</span>
          </label>
        </div>
        <p id="houseMessage" class="house-message" role="status" aria-live="polite"></p>
        <button class="house-submit" type="button" id="houseSubmitBtn">Submit</button>
      </div>
    </section>

    <section class="frame frame-slider hidden" id="votingPage" aria-label="School cabinet voting posts">
      <div class="selected-house-strip" id="selectedHouseStrip"></div>
      <div class="slider-shell">
        <button class="nav-button" type="button" id="prevBtn" aria-label="Previous post">&#8249;</button>

        <form id="voteForm" class="slider-window" novalidate>
          <div class="slides" id="slides">
            <section class="post-card active" data-post-name="Head Boy" data-shared-post="true">
              <h2>Head Boy</h2>
              <div class="candidate-grid">
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Aarav Nair" required>
                  <img class="candidate-photo" src="images/head-boy-aarav-nair.jpg" alt="Aarav Nair">
                  <span class="candidate-name">Aarav Nair</span>
                  <span class="candidate-class">Class X - A</span>
                  <img class="campaign-logo" src="images/head-boy-aarav-nair-logo.png" alt="Aarav Nair campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Kabir Sharma">
                  <img class="candidate-photo" src="images/head-boy-kabir-sharma.jpg" alt="Kabir Sharma">
                  <span class="candidate-name">Kabir Sharma</span>
                  <span class="candidate-class">Class X - C</span>
                  <img class="campaign-logo" src="images/head-boy-kabir-sharma-logo.png" alt="Kabir Sharma campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Rohan Iyer">
                  <img class="candidate-photo" src="images/head-boy-rohan-iyer.jpg" alt="Rohan Iyer">
                  <span class="candidate-name">Rohan Iyer</span>
                  <span class="candidate-class">Class IX - A</span>
                  <img class="campaign-logo" src="images/head-boy-rohan-iyer-logo.png" alt="Rohan Iyer campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Dev Patel">
                  <img class="candidate-photo" src="images/head-boy-dev-patel.jpg" alt="Dev Patel">
                  <span class="candidate-name">Dev Patel</span>
                  <span class="candidate-class">Class IX - D</span>
                  <img class="campaign-logo" src="images/head-boy-dev-patel-logo.png" alt="Dev Patel campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Nikhil Das">
                  <img class="candidate-photo" src="images/head-boy-nikhil-das.jpg" alt="Nikhil Das">
                  <span class="candidate-name">Nikhil Das</span>
                  <span class="candidate-class">Class VIII - B</span>
                  <img class="campaign-logo" src="images/head-boy-nikhil-das-logo.png" alt="Nikhil Das campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_boy" value="Vihaan Rao">
                  <img class="candidate-photo" src="images/head-boy-vihaan-rao.jpg" alt="Vihaan Rao">
                  <span class="candidate-name">Vihaan Rao</span>
                  <span class="candidate-class">Class VIII - D</span>
                  <img class="campaign-logo" src="images/head-boy-vihaan-rao-logo.png" alt="Vihaan Rao campaign logo">
                </label>
                <!-- <label class="candidate-card nota-card">
                  <input type="radio" name="head_boy" value="NOTA">
                  <span class="nota-mark">NOTA</span>
                  <span class="candidate-name">None of the Above</span>
                  <span class="candidate-class">No candidate selected</span>
                </label> -->
              </div>
            </section>

            <section class="post-card" data-post-name="Head Girl" data-shared-post="true">
              <h2>Head Girl</h2>
              <div class="candidate-grid">
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Diya Menon" required>
                  <img class="candidate-photo" src="images/head-girl-diya-menon.jpg" alt="Diya Menon">
                  <span class="candidate-name">Diya Menon</span>
                  <span class="candidate-class">Class X - B</span>
                  <img class="campaign-logo" src="images/head-girl-diya-menon-logo.png" alt="Diya Menon campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Meera Rao">
                  <img class="candidate-photo" src="images/head-girl-meera-rao.jpg" alt="Meera Rao">
                  <span class="candidate-name">Meera Rao</span>
                  <span class="candidate-class">Class X - D</span>
                  <img class="campaign-logo" src="images/head-girl-meera-rao-logo.png" alt="Meera Rao campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Sara Khan">
                  <img class="candidate-photo" src="images/head-girl-sara-khan.jpg" alt="Sara Khan">
                  <span class="candidate-name">Sara Khan</span>
                  <span class="candidate-class">Class IX - B</span>
                  <img class="campaign-logo" src="images/head-girl-sara-khan-logo.png" alt="Sara Khan campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Ananya Gupta">
                  <img class="candidate-photo" src="images/head-girl-ananya-gupta.jpg" alt="Ananya Gupta">
                  <span class="candidate-name">Ananya Gupta</span>
                  <span class="candidate-class">Class IX - C</span>
                  <img class="campaign-logo" src="images/head-girl-ananya-gupta-logo.png" alt="Ananya Gupta campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Ishita Roy">
                  <img class="candidate-photo" src="images/head-girl-ishita-roy.jpg" alt="Ishita Roy">
                  <span class="candidate-name">Ishita Roy</span>
                  <span class="candidate-class">Class VIII - A</span>
                  <img class="campaign-logo" src="images/head-girl-ishita-roy-logo.png" alt="Ishita Roy campaign logo">
                </label>
                <label class="candidate-card">
                  <input type="radio" name="head_girl" value="Prisha S">
                  <img class="candidate-photo" src="images/head-girl-prisha-s.jpg" alt="Prisha S">
                  <span class="candidate-name">Prisha S</span>
                  <span class="candidate-class">Class VIII - C</span>
                  <img class="campaign-logo" src="images/head-girl-prisha-s-logo.png" alt="Prisha S campaign logo">
                </label>
                <!-- <label class="candidate-card nota-card">
                  <input type="radio" name="head_girl" value="NOTA">
                  <span class="nota-mark">NOTA</span>
                  <span class="candidate-name">None of the Above</span>
                  <span class="candidate-class">No candidate selected</span>
                </label> -->
              </div>
            </section>

            <section class="post-card house-post" data-post-name="Sports Captain">
              <h2>Sports Captain</h2>
            </section>

            <section class="post-card house-post" data-post-name="Cultural Secretary"><h2>Cultural Secretary</h2></section>
            <section class="post-card house-post" data-post-name="Discipline Captain"><h2>Discipline Captain</h2></section>
            <section class="post-card house-post" data-post-name="Literary Secretary"><h2>Literary Secretary</h2></section>
            <section class="post-card house-post" data-post-name="House Captain"><h2>House Captain</h2></section>
            <section class="post-card house-post" data-post-name="House Vice Captain"><h2>House Vice Captain</h2></section>
            <section class="post-card house-post" data-post-name="House Prefect"><h2>House Prefect</h2></section>
            <section class="post-card house-post" data-post-name="House Secretary"><h2>House Secretary</h2></section>
          </div>
        </form>

        <button class="nav-button" type="button" id="nextBtn" aria-label="Next post">&#8250;</button>
      </div>

      <div class="slider-status">
        <span id="slideCounter">Post 1 of 10</span>
        <div class="dots" id="dots" aria-hidden="true"></div>
      </div>
    </section>

    <footer class="frame frame-submit hidden" id="submitFrame">
      <p id="message" role="status" aria-live="polite"></p>
      <button class="submit-button" type="submit" form="voteForm" id="submitBtn">Submit Vote</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
